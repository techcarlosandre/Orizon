services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: orizon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orizon_db}
      POSTGRES_USER: ${POSTGRES_USER:-orizon_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orizon_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orizon_user} -d ${POSTGRES_DB:-orizon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orizon_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app          # hot-reload em dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orizon_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app         # hot-reload em dev
      - /app/node_modules       # preserve node_modules do container
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - CHOKIDAR_USEPOLLING=true   # necessário em alguns ambientes Windows/WSL
    depends_on:
      - backend

volumes:
  postgres_data:
