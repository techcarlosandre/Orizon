server {
    listen 80;
    server_name orizon.techcarlos.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name orizon.techcarlos.com.br;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/orizon.techcarlos.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orizon.techcarlos.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # React Router — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend dynamically to avoid startup crash if backend is offline/unresolved
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
