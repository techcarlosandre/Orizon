name: Backend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orizon_test
          POSTGRES_USER: orizon_user
          POSTGRES_PASSWORD: orizon_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: "ci-secret-key-not-for-production"
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_DB: orizon_test
      POSTGRES_USER: orizon_user
      POSTGRES_PASSWORD: orizon_password
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      SUGGESTIONS_API_URL: "http://localhost:8000/api/suggestions"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements-dev.txt

      - name: Set up Node.js (for E2E tests)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies (for E2E tests)
        working-directory: ./frontend
        run: npm ci

      - name: Run pytest
        working-directory: ./backend
        run: pytest --cov=apps --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/htmlcov/
