name: Continuous Deployment

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build images in the GitHub runner (7 GB RAM) ──────────────────────────
      - name: Build backend Docker image
        run: docker build -t orizon-backend:latest ./backend --target production

      - name: Build frontend Docker image
        run: |
          docker build \
            -t orizon-frontend:latest \
            --build-arg VITE_API_BASE_URL=https://orizon.techcarlos.com.br/api \
            ./frontend --target production

      # ── Export images to tarballs ─────────────────────────────────────────────
      - name: Save images to tarballs
        run: |
          docker save orizon-backend:latest | gzip > /tmp/orizon-backend.tar.gz
          docker save orizon-frontend:latest | gzip > /tmp/orizon-frontend.tar.gz

      # ── SCP tarballs + compose file to EC2 ────────────────────────────────────
      - name: Upload images to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "/tmp/orizon-backend.tar.gz,/tmp/orizon-frontend.tar.gz"
          target: "/tmp"
          strip_components: 1

      # ── Load images and restart containers on EC2 ─────────────────────────────
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "Loading backend image..."
            docker load < /tmp/orizon-backend.tar.gz

            echo "Loading frontend image..."
            docker load < /tmp/orizon-frontend.tar.gz

            echo "Pulling latest code (docker-compose files)..."
            cd /var/www/orizon
            rm -f .git/index.lock
            git fetch origin
            git reset --hard origin/main

            echo "Restarting containers..."
            docker compose -f docker-compose.prod.yml up -d

            echo "Cleaning up tarballs..."
            rm -f /tmp/orizon-backend.tar.gz /tmp/orizon-frontend.tar.gz

            echo "Deploy completed successfully!"
            docker compose -f docker-compose.prod.yml ps
